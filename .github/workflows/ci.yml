name: Verificación de Tesis20

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tesis20-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compilar y validar plataforma
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true

    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Configurar Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar sintaxis del control de calidad
        run: node --check scripts/quality-check.mjs

      - name: Compilar
        run: npm run build

      - name: Verificar currículo y retos de Nido
        run: npm run check:nido

      - name: Verificar HTML por ruta, SEO, enlaces, CSP, PWA y presupuesto
        run: npm run quality
