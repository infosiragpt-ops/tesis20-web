name: Verificación de Tesis20

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tesis20-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compilar plataforma
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar
        run: npm run build
